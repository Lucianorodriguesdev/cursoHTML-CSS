<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="formulario.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="Mesmo" id="M" checked>
            <label for="M">Masculino</label>

            <input type="radio" name="Mesmo" id="F">
            <label for="F">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="ebas" id="iebas"><label for="iebas">Basquete</label>
            <input type="checkbox" name="esfut" id="iesfut "><label for="iesfut">Futebol</label>
            <input type="checkbox" name="esnat" id="iesnat"><label for="iesnat">Nataçao</label>
            <input type="checkbox" name="esten" id="iesten"><label for="iesten">Tenis</label>
            
        </fieldset>

        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
