<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="formulario.php" method="get">
        <p>
            <label for="iestado">Esolha um Estado:</label>

            <select name="estado" id="iestado">
                <option value="select" selected select disabled>Selecione</option>
                <optgroup label="Regiao Sudeste">
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                </optgroup>

                <optgroup label="Regiao Nordeste">
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="PE">Pernambuco</option>
                    <option value="MA">Maranhão</option>
                </optgroup>

            </select>
        </p>

        <p>
            <label for="iprofissao">Profisao:</label>
            <input type="text" name="profissao" id="iprofissao" list="list">
            <datalist id="list">
                <option >Desenvolvedor</option>
                <option value="adm">Administrador</option>
                <option value="prof">professor</option>
            </datalist>
        </p>
        <p>
            <label for="Msg">Mensagem</label>
            <textarea name="msg" id="Msg"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
