<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Aprendendo formularios</h1>
    <form action="cadastro.php" method="get">

            <!--funçao "autocomplete" no input, serve para que ele sugerir nomes que foram 
            escritos para facilitar ele vem ativado, quando colocamos "off" ele desativa essa 
            funçao-->

        <label for="inome">Nome:</label>
        <input autocomplete="off" type="text" name="nome" id="inome">

        <label for="isobrenome">Sobrenome:</label>
        <input type="text" name="sobrenome" id="isobrenome">
        <input type="submit" value="Enviar">
    </form>

</body>
</html>
