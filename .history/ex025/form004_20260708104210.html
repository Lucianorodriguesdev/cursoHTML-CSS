<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de formulario</h1>
    <form action="formulario.php" method="post" autocomplete="on">

        <p>
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" minlength="5"
            maxlength="26" required>
        </p>

        <p>
            <label for="iemail" >Email:</label>
            <input type="email" name="email" id="iemail" required autocomplete="email">
        </p>

        <p>
            <label for="inumero">Telefone</label>
            <input type="tel" name="numero" id="inumero" required autocomplete="tel" pattern="^[0-9]{4}-[0-9]{4}$">
        </p>

        <p>
            <label for="itel">Telefone</label>
            <input type="tel" name="telefone" id="itel" required autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" placeholder="(xx)xxxx-xxxx">
        </p>

        <!--uso de RegEx-->

        <input type="submit" value="Enviar">
        <input type="reset" value="limpar">
    </form>
</body>
</html>
