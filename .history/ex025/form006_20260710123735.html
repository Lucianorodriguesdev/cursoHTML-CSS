<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="formulario.php" method="get">
        <p>
            <label for="icor">Cor:</label>
            <input type="color" name="cor" id="icor" value="#00ff00">
        </p>

        <p>
            <label for="inivel">Nivel de satisfaçao:</label>
            <input type="range" name="nivel" id="inivel" min="1" max="10" value="2">
        </p>

        <p>
            <label for="ifoto">Envie a foto do perfil:</label>
            <input type="file" name="foto" id="ifoto">
                                                                    <!--quando for fazer envio de arquivo deve ser enviado pelo metodo post-->
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
