<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Responsiva</title>
     <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border: 1px solid black;
            width: 400px;
            border-collapse: collapse;
        }
        td,th{
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }
        tr:nth-child(2n){
            background-color: gray;
        }        
        caption{
             border: 1px solid black;
            padding: 5px;
            text-align: center;
            background-color: gray;
            color: white;
        }
        .container{ 
           
            overflow: auto;
        }

        /* com esse overflow deixamos a tabela responsiva 
            e a largura de 50vw deixamos a tabela mais curta
            para fazer a rolagem para os lados em uma tabela ainda menor */

    </style>
</head>
<body>
    <div class="container">
        <table>

</html>
