<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
  <style>
    iframe{
        display: block;
        margin: auto;
        margin-bottom: 10px;
    }
  </style>
</head>
<body>
    / *
    SEGURANÇa com iframe 

    para deixar o iframe mais seguro para que o link dentro do iframe nao aceite envio de dados 
    vamos colocar "sandbox=sandbox" referrerpolicy="no-referrer
    
    */ 

       <h1>
        Nessa aula trabalharemos com iframe
    </h1>  
    <iframe src="pag005.html" frameborder="0" sandbox="sandbox" referrerpolicy="no-referrer"></iframe>
</body>
</html>
